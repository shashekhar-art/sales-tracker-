sales_tracker:
  version: 1.x
  css:
    # base = design tokens (CSS custom properties). Loaded first so every
    # component file can consume var(--c-*), var(--sp-*), etc.
    base:
      css/_tokens.css: {}
    # component = all visual components scoped under .sales-tracker.
    component:
      css/sales_tracker.css: {}
  js:
    js/sales-tracker.js: {}
  dependencies:
    - core/drupal
    - core/once
